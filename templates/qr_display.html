<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPWH · Digital Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #f5f7fb, #e9ecf2);
            padding: 20px;
        }

        /* Rectangle Container */
        .qr-rectangle {
            width: 800px;
            max-width: 100%;
            background: white;
            border-radius: 48px;
            padding: 32px;
            box-shadow: 
                0 30px 60px -20px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(0, 0, 0, 0.02) inset;
            display: flex;
            gap: 32px;
        }

        /* Left Side - QR Code */
        .qr-left {
            flex: 1;
            background: #f8fafc;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid #e9eef2;
            display: flex;
            flex-direction: column;
        }

        .qr-code-container {
            background: white;
            padding: 20px;
            border-radius: 28px;
            box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.15);
            margin-bottom: 16px;
        }

        .qr-code-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 20px;
        }

        .qr-badge {
            background: #1e1e2f;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 50px;
            text-align: center;
            letter-spacing: 0.5px;
            margin-top: 8px;
            align-self: center;
        }

        /* Right Side - Content */
        .qr-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Brand */
        .brand {
            margin-bottom: 24px;
        }

        .brand h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: #1e1e2f;
            line-height: 1.1;
        }

        .pill {
            display: inline-block;
            background: #FB8B23;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 16px;
            border-radius: 50px;
            letter-spacing: 0.5px;
            margin: 8px 0 4px;
        }

        .subtitle {
            color: #64748b;
            font-size: 1rem;
            font-weight: 400;
        }

        .scan-tag {
            display: inline-block;
            background: #e9eef2;
            color: #334155;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 16px;
            border-radius: 50px;
            margin: 16px 0 8px;
        }

        /* URL Display */
        .url-box {
            background: #f1f5f9;
            border-radius: 60px;
            padding: 14px 20px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
        }

        .domain {
            font-family: 'SF Mono', 'Courier New', monospace;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e293b;
            word-break: break-all;
        }

        .copy-btn {
            background: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: #FB8B23;
            color: white;
            border-color: #FB8B23;
        }

        /* Steps - Vertical */
        .steps-vertical {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .step-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 0;
        }

        .step-number {
            width: 40px;
            height: 40px;
            background: #FB8B23;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 5px 10px rgba(251, 139, 35, 0.2);
        }

        .step-text {
            font-size: 1rem;
            font-weight: 500;
            color: #1e293b;
        }

        .step-icon {
            margin-left: auto;
            font-size: 1.2rem;
            color: #94a3b8;
        }

        /* Global Badge */
        .global-badge {
            background: #ecfdf3;
            border: 1px solid #abefc6;
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
        }

        .global-icon {
            background: #0f973d;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .global-text {
            font-size: 0.9rem;
            color: #0b4121;
            font-weight: 500;
        }

        .global-text span {
            color: #0f973d;
            font-weight: 700;
        }

        /* Action Buttons */
        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .btn-open {
            flex: 2;
            background: #1e1e2f;
            color: white;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            text-align: center;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-open:hover {
            background: #FB8B23;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px rgba(251, 139, 35, 0.4);
        }

        .btn-print {
            flex: 1;
            background: white;
            color: #334155;
            border: 1.5px solid #e2e8f0;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-print:hover {
            border-color: #FB8B23;
            color: #FB8B23;
        }

        /* Footer */
        .footer {
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.75rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            color: #FB8B23;
            font-size: 1.2rem;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2f;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .qr-rectangle {
                flex-direction: column;
                padding: 24px;
            }
            
            .qr-left {
                width: 100%;
            }
            
            .brand h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="qr-rectangle">
        <!-- Left Side - QR Code -->
        <div class="qr-left">
            <div class="qr-code-container">
                <img src="/static/qrcodes/qr-code-with-logo.png"
                     alt="QR Code"
                     onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=https://dpwh-web-portal.vercel.app&color=1e1e2f&bgcolor=ffffff'">
            </div>
            <div class="qr-badge">← SCAN TO CONNECT →</div>
        </div>

        <!-- Right Side - Content -->
        <div class="qr-right">
            <!-- Brand -->
            <div class="brand">
                <h1>DPWH</h1>
                <div class="pill">PORTAL</div>
                <div class="subtitle">Digital Infrastructure</div>
                <div class="scan-tag">📱 SCAN TO ACCESS</div>
            </div>

            <!-- URL -->
            <div class="url-box">
                <span class="domain">dpwh-web-portal.vercel.app</span>
                <div class="copy-btn" onclick="copyURL()" title="Copy link">📋</div>
            </div>

            <!-- Steps (Vertical) -->
            <div class="steps-vertical">
                <div class="step-row">
                    <div class="step-number">1</div>
                    <span class="step-text">Open camera on your phone</span>
                    <span class="step-icon">📱</span>
                </div>
                <div class="step-row">
                    <div class="step-number">2</div>
                    <span class="step-text">Point at QR code</span>
                    <span class="step-icon">📍</span>
                </div>
                <div class="step-row">
                    <div class="step-number">3</div>
                    <span class="step-text">Tap to access portal</span>
                    <span class="step-icon">⚡</span>
                </div>
            </div>

            <!-- Global Badge -->
            <div class="global-badge">
                <div class="global-icon">✓</div>
                <div class="global-text">
                    <span>Global access</span> — works on any device, anywhere
                </div>
            </div>

            <!-- Actions -->
            <div class="action-row">
                <a href="https://dpwh-web-portal.vercel.app" class="btn-open" target="_blank">
                    Open Portal →
                </a>
                <button class="btn-print" onclick="window.print()">
                    🖨️ Print
                </button>
            </div>

            <!-- Footer -->
            <div class="footer">
                <span>◈</span>
                <span>scan once · access anywhere</span>
                <span>◈</span>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">✓ Link copied to clipboard</div>

    <script>
        function copyURL() {
            const url = "https://dpwh-web-portal.vercel.app";
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'flex';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
