<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPWH · Digital Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f7fb;
        }

        /* Perfect Square Container */
        .qr-square {
            width: 520px;
            height: 520px;
            background: white;
            border-radius: 40px;
            padding: 32px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(0, 0, 0, 0.02) inset;
            display: flex;
            flex-direction: column;
        }

        /* Header - Compact */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title-group h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1e1e2f;
        }

        .pill {
            background: #FB8B23;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 50px;
            letter-spacing: 0.3px;
        }

        .subtitle {
            color: #64748b;
            font-size: 0.85rem;
            font-weight: 400;
        }

        /* QR Code Section - Square proportion */
        .qr-section {
            background: #f8fafc;
            border-radius: 32px;
            padding: 20px;
            margin: 8px 0 12px;
            border: 1px solid #e9eef2;
        }

        .qr-code {
            background: white;
            padding: 16px;
            border-radius: 24px;
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.1);
        }

        .qr-code img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
        }

        .qr-label {
            text-align: center;
            margin-top: 10px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #64748b;
            letter-spacing: 0.5px;
        }

        /* URL Display - Clean minimal */
        .url-container {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 12px 18px;
            margin: 8px 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
        }

        .domain {
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
        }

        .copy-icon {
            background: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
        }

        .copy-icon:hover {
            background: #FB8B23;
            color: white;
            border-color: #FB8B23;
        }

        /* Instructions Grid - 3 columns */
        .steps-grid {
            display: flex;
            gap: 8px;
            margin: 8px 0 12px;
        }

        .step-item {
            flex: 1;
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px 6px;
            text-align: center;
            border: 1px solid #e9eef2;
        }

        .step-icon {
            font-size: 1.2rem;
            margin-bottom: 6px;
        }

        .step-item span {
            font-size: 0.7rem;
            font-weight: 500;
            color: #334155;
            display: block;
            line-height: 1.3;
        }

        /* Global Access Badge */
        .global-badge {
            background: #ecfdf3;
            border: 1px solid #abefc6;
            border-radius: 30px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 6px 0 8px;
        }

        .global-icon {
            background: #0f973d;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .global-text {
            font-size: 0.8rem;
            color: #0b4121;
            font-weight: 500;
        }

        .global-text span {
            color: #0f973d;
            font-weight: 600;
        }

        /* Action Buttons - Side by side */
        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-open {
            flex: 2;
            background: #1e1e2f;
            color: white;
            text-decoration: none;
            padding: 12px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-open:hover {
            background: #FB8B23;
        }

        .btn-print {
            flex: 1;
            background: white;
            color: #334155;
            border: 1.5px solid #e2e8f0;
            padding: 12px 16px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-print:hover {
            border-color: #FB8B23;
            color: #FB8B23;
        }

        /* Footer */
        .footer {
            margin-top: 12px;
            color: #94a3b8;
            font-size: 0.7rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2f;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        /* Ensure square stays square */
        @media (max-width: 560px) {
            .qr-square {
                width: 95vw;
                height: 95vw;
                padding: 20px;
            }
            
            .step-item span {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>
    <div class="qr-square">
        <!-- Header -->
        <div class="header">
            <div class="title-group">
                <h1>DPWH</h1>
                <span class="pill">PORTAL</span>
            </div>
            <span class="subtitle">Digital Infrastructure</span>
        </div>

        <!-- QR Code -->
        <div class="qr-section">
            <div class="qr-code">
                <img src="/static/qrcodes/qr-code.png" 
                     alt="QR Code"
                     onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=https://dpwh-web-portal.vercel.app&color=1e1e2f&bgcolor=ffffff'">
            </div>
            <div class="qr-label">← SCAN TO CONNECT →</div>
        </div>

        <!-- URL (Clean, no copy button) -->
        <div class="url-container">
            <span class="domain">dpwh-web-portal.vercel.app</span>
            <div class="copy-icon" onclick="copyURL()" title="Copy link">📋</div>
        </div>

        <!-- 3-Step Instructions -->
        <div class="steps-grid">
            <div class="step-item">
                <div class="step-icon">📱</div>
                <span>Open camera</span>
            </div>
            <div class="step-item">
                <div class="step-icon">📍</div>
                <span>Point at QR</span>
            </div>
            <div class="step-item">
                <div class="step-icon">⚡</div>
                <span>Tap to access</span>
            </div>
        </div>

        <!-- Global Access -->
        <div class="global-badge">
            <div class="global-icon">✓</div>
            <div class="global-text">
                <span>Global access</span> — works on any device, anywhere
            </div>
        </div>

        <!-- Actions -->
        <div class="action-row">
            <a href="https://dpwh-web-portal.vercel.app" class="btn-open" target="_blank">
                Open Portal →
            </a>
            <button class="btn-print" onclick="window.print()">
                🖨️ Print
            </button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>◈</span>
            <span>scan once · access anywhere</span>
            <span>◈</span>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">✓ Link copied to clipboard</div>

    <script>
        function copyURL() {
            const url = "https://dpwh-web-portal.vercel.app";
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'flex';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
